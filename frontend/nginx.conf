server {
    listen 3000;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Live fMP4 fallback — an endless streamed body. nginx must NOT buffer it (buffering
    # adds seconds of latency and stalls the player), and the read timeout must allow a
    # long-lived stream like the WS path does.
    location /api/v1/live/mp4/ {
        proxy_pass http://axp-backend:10000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # API → backend (uWSGI). Keeps refresh cookies same-origin.
    location /api/ {
        proxy_pass http://axp-backend:10000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # TURN-free low-latency live: nginx proxies go2rtc's MSE WebSocket directly so the
    # media bytes bypass the Python app. Access is gated by a short-lived ticket (issued by
    # the backend after a JWT + camera-scope check) validated via auth_request. The client
    # connects to /live-ws/?src=<go2rtc_name>&ticket=<t>.
    location /live-ws/ {
        auth_request /__live_ws_auth;
        rewrite ^/live-ws/?$ /api/ws break;
        proxy_pass http://axp-go2rtc:1984;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # auth_request target — validates the ticket; the backend needs no JWT here. The auth
    # subrequest does not carry the original query string, so forward it via X-Original-URI
    # (the backend parses src + ticket out of it). 200 → nginx upgrades the socket; 403 → refused.
    location = /__live_ws_auth {
        internal;
        proxy_pass http://axp-backend:10000/api/v1/live/ws-auth;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-Original-URI $request_uri;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /manifest.webmanifest {
        default_type application/manifest+json;
    }
}
